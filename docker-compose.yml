version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./trading_robots.db
      - USE_MOCKS=true
      - DOCKER_MODE=false
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/trading_robots.db:/app/trading_robots.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0